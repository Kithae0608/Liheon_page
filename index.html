<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>I Love Liheon</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        .box {
            background-color: white;
            width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333333;
        }
        
        img, video {
            max-width: 100%; 
            height: auto; 
            border-radius: 10px; 
            margin-top: 15px; 
            margin-bottom: 15px; 
        }

        p {
            color: #666666;
            line-height: 1.6;
        }
        button {
            background-color: #008CBA;
            color: yellow;
            border: none;
            padding: 10px 20px;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #005f7a;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1> 아니아니 대마왕 김리헌👋</h1>
        
        <!-- 🌟 수정된 부분: autoplay(자동재생), muted(무음시작), playsinline(아이폰전체화면방지) 추가! 🌟 -->
        <video src="Liheon.mp4" controls autoplay muted playsinline></video>

        <p>나는 귀요미!<br>세상에서 제일 귀여운 베비지!</p>
        <p>엄마를 제일 좋아하지!</p>
        
        <button onclick="alert('사실 아빠도 좋아해! 🥳')">Click!!</button>
    </div>

</body>
</html>
